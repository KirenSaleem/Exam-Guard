# Render Blueprint — set Root Directory to "backend" in dashboard if not using blueprint.
services:
  - type: web
    name: examguard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
